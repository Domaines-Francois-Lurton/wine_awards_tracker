<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wine Awards Tracker — François Lurton</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="text-slate-900 min-h-screen" style="background-color:#F7F6F4">

  <!-- ── HEADER ── -->
  <header class="bg-white border-b border-slate-100 sticky top-0 z-40" style="height:72px">
    <div class="h-full flex items-center">

      <!-- Zone logo — largeur sidebar, padding vertical pour respiration -->
      <div class="flex-shrink-0 w-16 lg:w-64 flex items-center justify-center border-r border-slate-100 h-full" style="padding: 12px 20px">
        <button id="sidebarToggle" class="lg:hidden p-1.5 rounded-md text-slate-500 hover:bg-slate-100 transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
          </svg>
        </button>
        <img src="logo.svg" alt="Domaines François Lurton" class="hidden lg:block w-full h-auto object-contain" style="max-height:44px" />
      </div>

      <!-- Search — alignée à gauche, prend tout l'espace, très visible -->
      <div class="flex-1 flex items-center px-5 sm:px-8">
        <div class="relative w-full">
          <svg class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z"/>
          </svg>
          <input id="searchInput" type="text" placeholder="Rechercher un vin, domaine, critique, note…"
            class="w-full border-2 border-slate-200 rounded-xl pl-11 pr-5 py-3 text-sm font-medium focus:outline-none focus:border-slate-900 bg-white placeholder-slate-400 transition-colors" />
        </div>
      </div>

      <!-- Export -->
      <div class="flex-shrink-0 pr-5">
        <button id="exportBtn"
          class="flex items-center gap-1.5 text-xs text-slate-500 border border-slate-200 hover:border-slate-400 hover:text-slate-900 px-3 py-2 rounded-lg transition-colors whitespace-nowrap">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
          </svg>
          <span class="hidden sm:inline">Export CSV</span>
        </button>
      </div>
    </div>
  </header>

  <!-- ── SIDEBAR OVERLAY (mobile) ── -->
  <div id="sidebarBackdrop" class="fixed inset-0 bg-black/40 z-30 hidden lg:hidden"></div>

  <!-- ── APP LAYOUT ── -->
  <div class="flex h-[calc(100vh-72px)]">

    <!-- ── SIDEBAR ── -->
    <aside id="sidebar"
      class="w-64 flex-shrink-0 bg-white border-r border-slate-100 flex flex-col overflow-hidden h-[calc(100vh-72px)]">

      <!-- Sections fixes -->
      <div class="px-4 pt-4 space-y-3 flex-shrink-0">

        <div>
          <p class="filter-section-title">Pays</p>
          <div class="mt-2 space-y-0.5" id="filterPays"></div>
        </div>

        <div>
          <p class="filter-section-title">Disponibilité</p>
          <div class="mt-2 space-y-1" id="filterAvail"></div>
        </div>

        <div>
          <p class="filter-section-title">Couleur</p>
          <div class="mt-2 space-y-1" id="filterCouleur"></div>
        </div>

      </div>

      <!-- Domaine — flex-1 sur desktop, normal sur mobile -->
      <div class="sidebar-domaine-section px-4 mt-3">
        <p class="filter-section-title">Domaine</p>
        <div class="mt-2 space-y-1 scrollbar-hide" id="filterDomaine"></div>
      </div>

      <!-- Score — toujours visible en bas (sticky) -->
      <div class="sidebar-score px-4 py-4 border-t border-slate-100">
        <p class="filter-section-title">Score minimum</p>
        <div class="mt-2 grid grid-cols-2 gap-1.5">
          <button class="score-btn active" data-score="0">Tous</button>
          <button class="score-btn" data-score="90">90+</button>
          <button class="score-btn" data-score="92">92+</button>
          <button class="score-btn" data-score="95">95+</button>
        </div>
      </div>

    </aside>

    <!-- ── MAIN ── -->
    <main class="flex-1 overflow-y-auto min-w-0">

      <!-- KPIs masqués (éléments conservés pour le JS) -->
      <div style="display:none">
        <div id="kpiTotal"></div><div id="kpiNoted"></div>
        <div id="kpiAvg"></div><div id="kpiElite"></div>
      </div>

      <!-- Dernières notes -->
      <div class="px-4 sm:px-6 pt-5 pb-4">
        <p class="text-[10px] font-bold tracking-[0.15em] uppercase text-slate-400 mb-3 flex items-center gap-1.5">
          <span class="text-amber-400">★</span> Dernières notes reçues
        </p>
        <div id="recentNotes" class="flex gap-3 overflow-x-auto pb-1 scrollbar-hide"></div>
      </div>

      <!-- Multi-select bar -->
      <div id="multiBar" class="mx-4 sm:mx-6 mb-4 hidden">
        <div class="bg-slate-900 rounded-xl px-4 sm:px-5 py-3.5 flex items-center justify-between gap-3">
          <div class="flex items-center gap-2 min-w-0">
            <span class="w-2 h-2 rounded-full bg-green-400 animate-pulse flex-shrink-0"></span>
            <span id="multiCount" class="text-sm font-medium text-white truncate"></span>
          </div>
          <button id="multiCopy"
            class="flex-shrink-0 bg-white text-slate-900 text-xs font-bold px-4 py-2 rounded-lg hover:bg-slate-100 transition-colors flex items-center gap-2">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3"/>
            </svg>
            Copier
          </button>
        </div>
      </div>

      <!-- Grid header -->
      <div class="px-4 sm:px-6 flex items-center justify-between mb-3 gap-3">
        <p id="resultCount" class="text-xs font-semibold text-slate-500 uppercase tracking-widest flex-shrink-0"></p>
        <div class="flex items-center gap-2">
          <!-- Toggle vue — masqué mobile -->
          <div class="hidden sm:flex rounded-lg border border-slate-200 overflow-hidden bg-white">
            <button id="viewGrid" class="view-btn active px-2.5 py-1.5" title="Vignettes">
              <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/>
              </svg>
            </button>
            <button id="viewList" class="view-btn px-2.5 py-1.5 border-l border-slate-200" title="Liste">
              <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
              </svg>
            </button>
          </div>
          <select id="sortSelect" class="text-xs border border-slate-200 rounded-lg px-2.5 py-1.5 bg-white text-slate-700 focus:outline-none focus:ring-1 focus:ring-slate-400">
            <option value="score">Meilleur score</option>
            <option value="name">Nom A–Z</option>
            <option value="domaine">Domaine A–Z</option>
            <option value="millesime">Millésime ↓</option>
          </select>
        </div>
      </div>

      <!-- Grid / List container -->
      <div id="wineGrid" class="px-4 sm:px-6 pb-8 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-3">
        <div class="col-span-full text-sm text-slate-400 py-16 text-center">Chargement…</div>
      </div>
    </main>
  </div>

  <!-- ── MODAL ── -->
  <div id="modalOverlay" class="fixed inset-0 bg-black/40 backdrop-blur-sm z-50 hidden items-center justify-center p-3 sm:p-6" style="display:none">
    <div id="modalBox" class="bg-white rounded-2xl shadow-2xl w-full max-w-2xl max-h-[95vh] sm:max-h-[90vh] overflow-hidden flex flex-col">
      <div id="modalHeader" class="border-l-4 px-5 sm:px-6 pt-5 sm:pt-6 pb-4 flex-shrink-0">
        <div class="flex items-start justify-between">
          <div>
            <div id="modalDomaine" class="text-[10px] font-bold tracking-[0.15em] uppercase text-slate-400 mb-1"></div>
            <div id="modalNom" class="text-lg sm:text-xl font-bold text-slate-900"></div>
            <div id="modalMeta" class="text-sm text-slate-500 mt-0.5"></div>
          </div>
          <button id="modalClose" class="ml-3 flex-shrink-0 text-slate-400 hover:text-slate-900 transition-colors mt-1">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
            </svg>
          </button>
        </div>
      </div>
      <div class="overflow-y-auto px-5 sm:px-6 pb-6 flex-1">
        <div id="modalScores" class="mt-4"></div>
        <div id="modalRecap" class="mt-5 pt-4 border-t border-slate-100"></div>
      </div>
      <div class="px-5 sm:px-6 py-4 border-t border-slate-100 flex-shrink-0 flex items-center justify-between bg-gray-50 rounded-b-2xl">
        <div id="modalStock"></div>
        <button id="modalCopyBtn"
          class="flex items-center gap-2 bg-slate-900 text-white text-xs font-bold px-4 py-2.5 rounded-lg hover:bg-slate-700 transition-colors">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3"/>
          </svg>
          Copier les notes
        </button>
      </div>
    </div>
  </div>

  <!-- TOAST -->
  <div id="toast"
    class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-slate-900 text-white text-xs font-medium px-5 py-2.5 rounded-full opacity-0 transition-all duration-300 z-50 pointer-events-none shadow-xl">
    ✓ Copié dans le presse-papiers
  </div>

  <script src="app.js"></script>
</body>
</html>
